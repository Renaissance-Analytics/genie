appId: ai.tynn.genie
productName: Genie
copyright: Copyright © 2026 Wishborn / Tynn

directories:
  buildResources: resources
  output: dist

files:
  - from: .
    filter:
      - app/**/*
      # The tray icon + app icon live in resources/ and are read at
      # runtime by main/background.ts (which expects them at
      # <asar>/resources/*.png). Without this rule they're not in the
      # asar bundle and the tray surfaces with a blank icon.
      - resources/tray-icon.png
      - resources/tray-icon-update.png
      - resources/icon.png
      - package.json

asar: true

# Tier 3 — detached pty-host packaging.
#
# The host (app/pty-host.js) is spawned via `process.execPath` with
# ELECTRON_RUN_AS_NODE=1, i.e. it runs as PLAIN NODE whose require() is NOT
# asar-aware — so the host script itself can't be loaded from inside app.asar.
# And node-pty is a NATIVE module: its prebuilt .node can't be loaded from
# inside an asar at all. Both must be UNPACKED to app.asar.unpacked so they
# exist as real files on disk. resolveHostScript() (main/terminal/host-locate.ts)
# resolves the host to the unpacked path first, then falls back defensively.
asarUnpack:
  - app/pty-host.js
  - node_modules/node-pty/**/*

# Custom protocol — genie:// — registered at install time. Story #150 uses
# this for the OAuth callback handoff from tynn.ai/login.
protocols:
  - name: Genie OAuth
    schemes:
      - genie

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  # No explicit .icns — electron-builder derives one from resources/icon.png
  # at build time. Drop in a real icon.icns later for tighter control.
  icon: resources/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  # Notarisation envs are picked up from CI at release time.
  # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID

win:
  target:
    - target: nsis
      arch:
        - x64
    # Portable is a self-extracting EXE that doesn't actually install —
    # it runs Genie directly from a temp dir. We ship it alongside the
    # NSIS installer so users can isolate "installer broken" vs "app
    # broken" when the installer silently fails (Defender quarantine,
    # corporate AV, NSIS extraction failure on the target machine).
    - target: portable
      arch:
        - x64
  # Hand-built multi-size .ico (build-icons.cjs) — each layer resampled
  # individually so the 16/24/32px taskbar + alt-tab renderings stay
  # legible instead of being Windows-shrunk from the 256px layer.
  icon: resources/icon.ico
  # Code signing happens via env vars in CI:
  # CSC_LINK, CSC_KEY_PASSWORD

nsis:
  # `oneClick: false` gives the full assisted-installer wizard with
  # location chooser + shortcut options instead of a silent install.
  oneClick: false
  # `perMachine: false` keeps the install per-user (no UAC prompt),
  # which also means it survives signing being absent — UAC + unsigned
  # binary is a classic silent-fail combination on Windows 11.
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Allow the user to elevate later if they actually want a machine-
  # wide install. Without this, the wizard pre-decides for them.
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Genie
  # Use the universal Unicode installer header so non-ASCII paths in
  # the user profile (e.g. accented characters) don't break extraction.
  unicode: true
  # Surface uninstaller in Add/Remove Programs cleanly.
  deleteAppDataOnUninstall: false

linux:
  target:
    - AppImage
  icon: resources/icon.png
  category: Development

publish:
  provider: github
  owner: Renaissance-Analytics
  repo: genie
  # `latest.yml` (Win + Linux) and `latest-mac.yml` are written next to
  # the installers when electron-builder ships a release. electron-updater
  # reads them from this provider via GitHub Releases.
  # `prerelease` so CI uploads attach to existing pre-release tags created
  # by `gh release create --prerelease`; switch to `release` for stable
  # cuts so they're tagged Latest in the GitHub UI.
  releaseType: prerelease
