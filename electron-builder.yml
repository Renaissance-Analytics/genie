appId: ai.tynn.genie
productName: Genie
copyright: Copyright © 2026 Renaissance Analytics

directories:
  buildResources: resources
  output: dist

files:
  - from: .
    filter:
      - app/**/*
      # The tray icon + app icon live in resources/ and are read at
      # runtime by main/background.ts (which expects them at
      # <asar>/resources/*.png). Without this rule they're not in the
      # asar bundle and the tray surfaces with a blank icon.
      - resources/tray-icon.png
      - resources/tray-icon-update.png
      - resources/icon.png
      # The in-app Docs viewer reads the user-guide markdown at runtime from
      # <asar>/docs (main/docs/docs.ts resolveDocsDir). Ship the docs/ folder
      # so docs:list / docs:read have something to serve in the packaged app.
      - docs/**/*
      - package.json

asar: true

# Post-pack fix: the Windows node-pty rebuild leaves conpty.dll / OpenConsole.exe
# out of build/Release, so ConPTY fails to load at runtime ("Cannot find conpty.dll")
# and NO terminal spawns on a packaged Windows install. This copies them into place.
# See build/after-pack.js + genie #14.
afterPack: build/after-pack.js

# Tier 3 — detached pty-host packaging.
#
# The detached host now ships inside @particle-academy/fancy-term-host
# (dist/pty-host.js + its sibling chunk-*.js + package.json). It is spawned via
# `process.execPath` with ELECTRON_RUN_AS_NODE=1, i.e. it runs as PLAIN NODE
# whose require()/ESM resolution is NOT asar-aware — so the host script (and the
# package.json that marks it `"type":"module"`) can't be loaded from inside
# app.asar. And node-pty is a NATIVE module: its prebuilt .node can't be loaded
# from inside an asar at all. The whole package dist + node-pty must be UNPACKED
# to app.asar.unpacked so they exist as real files on disk. The package's
# ptyHostScriptPath() resolves to the unpacked path first, then falls back
# defensively (genie-adapter.ts guards with fs.existsSync → in-process fallback).
asarUnpack:
  - node_modules/@particle-academy/fancy-term-host/**
  - node_modules/node-pty/**/*

# Tier 3+ — per-user OS-service pty-host runtime (fancy-term-host@0.2.0 /service).
#
# The OS service runs the pty-host on its OWN STANDALONE NODE runtime (NOT
# Genie's Electron binary — that's what pins the executable across updates).
# That standalone Node has a DIFFERENT native ABI than Electron, so node-pty's
# .node binding must be PREBUILT for THAT Node's ABI. Both are shipped beside the
# app as extraResources at `<resources>/runtime/`:
#
#   resources/runtime/node[.exe]    a pinned standalone Node (the service's runtime)
#   resources/runtime/node-pty/     node-pty PREBUILT for that Node's ABI
#                                   (its build/Release/*.node + package.json +
#                                    lib/, so `require('node-pty')` resolves with
#                                    NODE_PATH=<resources>/runtime)
#
# At runtime main/terminal/host-service.ts resolveShippedRuntime() probes
# `<process.resourcesPath>/runtime/node[.exe]` and points the service at it
# (runtime.nodePath / runtime.nodePtyDir). When this directory is ABSENT (CI
# hasn't produced it yet, or a dev build), resolveShippedRuntime() returns null,
# ensureHostService() returns {ok:false}, and Genie FALLS BACK to the detached
# spawn → in-process path. The app stays fully functional; the service simply
# doesn't activate until CI ships the runtime.
#
# ====================================================================
# CI MUST PRODUCE `resources/runtime/` BEFORE `nextron build` (per OS×arch):
#   1. Download a PINNED standalone Node for the target OS+arch (e.g. the
#      official node-vX.Y.Z-win-x64 / -darwin-arm64 / -linux-x64 dist), and
#      place its `node`/`node.exe` at resources/runtime/node[.exe].
#   2. In a scratch dir, `npm i node-pty@^1.1.0` and REBUILD it against THAT
#      standalone Node's ABI:
#        node-gyp rebuild --target=<nodeVersion> --dist-url=https://nodejs.org/dist
#      (or `prebuild-install --runtime=node --target=<nodeVersion>`), NOT against
#      Electron. Copy the resulting node-pty package (lib/ + build/Release/*.node
#      + package.json) to resources/runtime/node-pty/.
#   3. Verify on the build agent:
#        resources/runtime/node -e "process.env.NODE_PATH='resources/runtime'; \
#          require('module').Module._initPaths(); require('node-pty'); \
#          console.log('node-pty loads on standalone node ABI')"
# This is intentionally NOT run in the local sandbox (native rebuilds can't be
# exercised here) — the fallback covers a missing runtime. See README/the commit
# body for the full checklist.
# ====================================================================
#
# This block is a no-op until resources/runtime exists on the build agent
# (electron-builder just skips a `from` that has no matches). It is safe to keep
# committed: a dev/local build without the runtime simply ships nothing here and
# uses the fallback chain.
extraResources:
  - from: resources/runtime
    to: runtime
    filter:
      - '**/*'

# Custom protocol — genie:// — registered at install time. Story #150 uses
# this for the OAuth callback handoff from tynn.ai/login.
protocols:
  - name: Genie OAuth
    schemes:
      - genie

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  # No explicit .icns — electron-builder derives one from resources/icon.png
  # at build time. Drop in a real icon.icns later for tighter control.
  icon: resources/icon.png
  hardenedRuntime: true
  # node-pty forks the shell through a nested `spawn-helper` Mach-O. Under
  # Hardened Runtime + notarization it (and node-pty's .node) are killed on exec
  # unless the app is signed WITH these entitlements — without them the pty
  # master opens (create() doesn't throw) but the shell never runs, so on signed
  # Mac builds the terminal shows a cursor and no output. entitlementsInherit
  # carries disable-library-validation onto the nested helper. See build/*.plist.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  gatekeeperAssess: false
  # Notarize when the build is Developer-ID signed (CI provides MAC_CSC_LINK +
  # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID). electron-builder
  # skips notarization automatically for unsigned/ad-hoc builds, so this stays
  # safe even before the signing secrets exist. macOS auto-update REQUIRES a
  # signed + notarized app — an ad-hoc signature fails Squirrel.Mac validation
  # ("code has no resources but signature indicates they must be present"),
  # which is the exact failure this readies the real fix for.
  notarize: true

win:
  target:
    - target: nsis
      arch:
        - x64
    # Portable is a self-extracting EXE that doesn't actually install —
    # it runs Genie directly from a temp dir. We ship it alongside the
    # NSIS installer so users can isolate "installer broken" vs "app
    # broken" when the installer silently fails (Defender quarantine,
    # corporate AV, NSIS extraction failure on the target machine).
    - target: portable
      arch:
        - x64
  # Hand-built multi-size .ico (build-icons.cjs) — each layer resampled
  # individually so the 16/24/32px taskbar + alt-tab renderings stay
  # legible instead of being Windows-shrunk from the 256px layer.
  icon: resources/icon.ico
  # Code signing happens via env vars in CI:
  # CSC_LINK, CSC_KEY_PASSWORD

nsis:
  # ONE-CLICK (silent) installer so auto-updates are truly hands-free: on
  # quitAndInstall, electron-updater runs the downloaded installer silently and
  # swaps the app in place — NO wizard, no "install for all users / only me"
  # page. `oneClick: false` made every auto-update launch the FULL assisted
  # wizard, which is what surfaced the install-options page on a routine upgrade.
  # Genie installs nothing new at install time — the Tier-3 pty-host is spawned
  # at RUNTIME from the bundled runtime — so there is no per-upgrade setup to
  # prompt for. (First install is one-click too: in NSIS the same flag governs
  # both, and silent updates are the priority.)
  oneClick: true
  # `perMachine: false` keeps the install per-user (no UAC prompt), which also
  # dodges the unsigned-binary + UAC silent-fail combo on Windows 11. (A oneClick
  # installer is incompatible with a directory chooser, so
  # allowToChangeInstallationDirectory is intentionally omitted.)
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Genie
  # Use the universal Unicode installer header so non-ASCII paths in
  # the user profile (e.g. accented characters) don't break extraction.
  unicode: true
  # Surface uninstaller in Add/Remove Programs cleanly.
  deleteAppDataOnUninstall: false
  # Custom install/uninstall hooks (build/installer.nsh): open a tightly-scoped
  # inbound Windows Firewall rule for the Mobile server port (51718, scoped to the
  # Tailscale CGNAT range 100.64.0.0/10) so a paired phone can reach it, and remove
  # it on uninstall. NOTE: netsh needs admin, so this only takes effect in an
  # elevated/perMachine install (see build/installer.nsh) — the per-user runtime
  # path adds it via a UAC prompt from Settings -> Mobile.
  include: build/installer.nsh

linux:
  target:
    - AppImage
  icon: resources/icon.png
  category: Development

publish:
  provider: github
  owner: Renaissance-Analytics
  repo: genie
  # `latest.yml` (Win + Linux) and `latest-mac.yml` are written next to
  # the installers when electron-builder ships a release. electron-updater
  # reads them from this provider via GitHub Releases.
  # `draft` so the Release stays INVISIBLE to electron-updater while the three
  # per-OS jobs upload in parallel — release.yml's prepare-release job creates
  # the draft, each platform attaches its artifacts, and finalize-release flips
  # draft→prerelease only once latest.yml (Windows, uploaded last) and every
  # installer are present. With `prerelease` here, a client that checked for
  # updates during the ~6-min build window 404'd on the not-yet-uploaded
  # latest.yml. (Stable cuts: drop --prerelease in finalize-release.)
  releaseType: draft
