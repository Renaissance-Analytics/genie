name: Test Build (no publish)

# NON-PUBLISHING manual build. Produces the per-user OS-service runtime
# (resources/runtime/) + the installers, and uploads the installers as workflow
# ARTIFACTS only. It deliberately does NOT:
#   - create a GitHub Release,
#   - write/upload latest.yml / latest-mac.yml,
#   - tag anything.
# electron-builder is invoked with `--publish never`, so electron-updater is
# NEVER triggered for existing users. Safe to run during a release freeze: the
# artifacts here are smoke-test installers, not a release.
on:
  workflow_dispatch: {}

# Read-only is enough — we never touch Releases. (Default is read anyway; pinned
# explicit so a future default change can't silently grant write.)
permissions:
  contents: read

jobs:
  test-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # windows-2022 is the REQUIRED target (matches release.yml's pin —
          # windows-latest 2025's VS layout broke node-gyp discovery). The
          # runtime ships N-API prebuilds so no gyp rebuild is needed, but we
          # keep the pin identical to the real release path.
          - os: windows-2022
            artifact: 'Genie*.exe'
          - os: macos-latest
            artifact: 'Genie-*.dmg'
          - os: ubuntu-latest
            artifact: 'Genie-*.AppImage'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Python (node-gyp needs distutils)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        env:
          CI: true
        run: npm ci

      - name: Build service runtime (resources/runtime)
        # Standalone Node + ABI-matched node-pty for THIS os/arch. The script
        # self-verifies node-pty loads under the downloaded standalone Node.
        run: npm run build:runtime

      - name: Assert runtime shipped (node + node-pty .node present)
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "Windows" ]; then
            NODE_BIN="resources/runtime/node.exe"
          else
            NODE_BIN="resources/runtime/node"
          fi
          echo "checking $NODE_BIN"
          test -f "$NODE_BIN" || { echo "MISSING standalone node: $NODE_BIN"; exit 1; }
          # The node-pty native binding lives EITHER in prebuilds/<plat>-<arch>/
          # (win + mac: published N-API prebuild) OR in build/Release/ (linux:
          # source-built by node-gyp — no published linux prebuild). Accept either.
          BINDING="$(find resources/runtime/node-pty -name 'pty.node' \
            \( -path '*/prebuilds/*' -o -path '*/build/Release/*' \) -print -quit 2>/dev/null || true)"
          if [ -z "$BINDING" ]; then
            echo "MISSING node-pty binding (no pty.node under prebuilds/ or build/Release/)"
            find resources/runtime/node-pty -name '*.node' || true
            exit 1
          fi
          echo "runtime OK: $NODE_BIN + $BINDING"

      - name: Build installers (Windows) — NO publish
        if: runner.os == 'Windows'
        shell: bash
        env:
          # No signing in the test build; explicitly opt out of auto-discovery so
          # electron-builder doesn't treat an empty CSC_LINK as a cert path.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx nextron build --win --publish never

      - name: Build installers (macOS) — NO publish
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx nextron build --mac --publish never

      - name: Build installers (Linux) — NO publish
        if: runner.os == 'Linux'
        run: npx nextron build --linux --publish never

      - name: Drop the local auto-update manifest (defence in depth)
        # electron-builder ALWAYS writes dist/latest*.yml during packaging, even
        # with `--publish never` (publish only controls UPLOADING). The manifest
        # is harmless on its own — electron-updater reads latest*.yml from the
        # GitHub RELEASE feed, not from a workflow artifact — but we delete it here
        # and never upload *.yml (the artifact step below only takes the
        # installer), so nothing that even resembles a release feed can leak out
        # of this non-publishing build.
        shell: bash
        run: |
          set -euo pipefail
          rm -f dist/latest*.yml || true
          echo "removed local latest*.yml; artifacts upload installers only."

      - name: Assert this run created NO GitHub Release
        # The real auto-update guarantee: `--publish never` must not have created
        # or attached to any GitHub Release. We snapshot the release list and fail
        # if a release referencing this run's SHA appeared.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # A non-publishing build must never produce a draft/published release for
          # this commit. List releases and ensure none targets our SHA.
          if gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
               --json tagName,targetCommitish,isDraft 2>/dev/null \
               | grep -q "${GITHUB_SHA}"; then
            echo "ERROR: a GitHub Release referencing ${GITHUB_SHA} exists — publish was NOT suppressed!"
            exit 1
          fi
          echo "OK: no GitHub Release created for ${GITHUB_SHA} — auto-update feed untouched."

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: genie-test-${{ matrix.os }}
          path: |
            dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
