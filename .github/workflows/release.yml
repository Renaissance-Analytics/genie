name: Release

# Builds signed installers for Windows, macOS, and Linux on tag push.
# Each platform runs on its native runner so node-pty + better-sqlite3
# native modules link against the right ABI.
#
# Required secrets (configure under repo Settings → Secrets and variables
# → Actions). Without them the build still runs but produces unsigned
# installers — fine for testing the pipeline, not for distribution:
#
#   GH_TOKEN                — A token with repo:write permission so
#                             electron-builder can attach release
#                             artifacts to a GitHub Release. The default
#                             secrets.GITHUB_TOKEN works for the same-
#                             repo case.
#
#   Windows (NSIS):
#     WINDOWS_CSC_LINK            — base64-encoded .pfx OR https URL
#     WINDOWS_CSC_KEY_PASSWORD    — password for the .pfx
#
#   macOS (Developer ID + notarisation):
#     MAC_CSC_LINK                — base64-encoded .p12
#     MAC_CSC_KEY_PASSWORD        — password for the .p12
#     APPLE_ID                    — Apple ID for notarisation
#     APPLE_APP_SPECIFIC_PASSWORD — app-specific password
#     APPLE_TEAM_ID               — your Developer Team ID

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# The default GITHUB_TOKEN is read-only for `contents`. electron-builder
# needs write to attach installers + latest.yml to the GitHub Release;
# without this it gets a 403 on the upload step.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: 'Genie-Setup-*.exe'
          - os: macos-latest
            artifact: 'Genie-*.dmg'
          - os: ubuntu-latest
            artifact: 'Genie-*.AppImage'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Python (node-gyp needs distutils)
        # node-pty / better-sqlite3 native rebuild goes through node-gyp,
        # which still imports distutils. Python 3.12 dropped it from
        # stdlib; pin to 3.11 across all runners so the rebuild succeeds
        # without manual setuptools installs.
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # CI=true makes electron-builder install-app-deps fail loudly
        # rather than fall back to prebuilt-only via our postinstall
        # `|| echo` guard. We want a clean ABI match on release builds.
        env:
          CI: true
        run: npm ci

      # The build steps below conditionally export signing env vars only
      # when the corresponding secrets are present. Setting CSC_LINK="" (the
      # default when a secret isn't configured) makes electron-builder treat
      # the empty string as a cert path and bail with "<project-dir> not a
      # file". Explicit absence vs. "yes I want unsigned" is set via
      # CSC_IDENTITY_AUTO_DISCOVERY=false instead.

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$WINDOWS_CSC_LINK" ]; then
            export CSC_LINK="$WINDOWS_CSC_LINK"
            export CSC_KEY_PASSWORD="$WINDOWS_CSC_KEY_PASSWORD"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx nextron build --win

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            export CSC_LINK="$MAC_CSC_LINK"
            export CSC_KEY_PASSWORD="$MAC_CSC_KEY_PASSWORD"
            export APPLE_ID="$APPLE_ID_SECRET"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx nextron build --mac

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx nextron build --linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-installer
          path: |
            dist/${{ matrix.artifact }}
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14
