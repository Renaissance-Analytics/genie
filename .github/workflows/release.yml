name: Release

# Builds signed installers for Windows, macOS, and Linux on tag push.
# Each platform runs on its native runner so node-pty + better-sqlite3
# native modules link against the right ABI.
#
# Required secrets (configure under repo Settings → Secrets and variables
# → Actions). Without them the build still runs but produces unsigned
# installers — fine for testing the pipeline, not for distribution:
#
#   GH_TOKEN                — A token with repo:write permission so
#                             electron-builder can attach release
#                             artifacts to a GitHub Release. The default
#                             secrets.GITHUB_TOKEN works for the same-
#                             repo case.
#
#   Windows (NSIS):
#     WINDOWS_CSC_LINK            — base64-encoded .pfx OR https URL
#     WINDOWS_CSC_KEY_PASSWORD    — password for the .pfx
#
#   macOS (Developer ID + notarisation):
#     MAC_CSC_LINK                — base64-encoded .p12
#     MAC_CSC_KEY_PASSWORD        — password for the .p12
#     APPLE_ID                    — Apple ID for notarisation
#     APPLE_APP_SPECIFIC_PASSWORD — app-specific password
#     APPLE_TEAM_ID               — your Developer Team ID

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# The default GITHUB_TOKEN is read-only for `contents`. electron-builder
# needs write to attach installers + latest.yml to the GitHub Release;
# without this it gets a 403 on the upload step.
permissions:
  contents: write

jobs:
  # All three platform jobs run in parallel and each one wants to
  # publish to the same GitHub Release. electron-builder's publish
  # step creates the Release if it doesn't exist — but with three
  # parallel POSTs, two of them lose the race and 422 with
  # "tag_name already_exists" before they get a chance to attach
  # assets. Create the Release shell up front so everyone can attach
  # cleanly.
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Ensure GitHub Release exists for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Create the release as a DRAFT (not a visible prerelease). Drafts are
          # invisible to electron-updater, so the three platform builds can
          # attach their artifacts over the next ~6 min without any client
          # seeing a half-built release. finalize-release un-drafts it at the end.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes "Automated build for $TAG"
          else
            echo "Release $TAG already exists; reusing"
          fi

  release:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned to windows-2022 (not windows-latest). When Microsoft
          # rolled `windows-latest` from 2022 → 2025 in mid-2026, the new
          # image's Visual Studio install layout broke node-gyp's
          # auto-discovery and node-pty failed to rebuild
          # ("Could not find any Visual Studio installation to use").
          # Pin so we control the image rollover ourselves.
          - os: windows-2022
            # Glob matches both the NSIS installer (Genie-Setup-*.exe)
            # and the portable build (Genie-*.exe without the Setup-
            # prefix) so both get attached to the release.
            artifact: 'Genie*.exe'
          - os: macos-latest
            artifact: 'Genie-*.dmg'
          - os: ubuntu-latest
            artifact: 'Genie-*.AppImage'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Set up Python (node-gyp needs distutils)
        # node-pty / better-sqlite3 native rebuild goes through node-gyp,
        # which still imports distutils. Python 3.12 dropped it from
        # stdlib; pin to 3.11 across all runners so the rebuild succeeds
        # without manual setuptools installs.
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        # CI=true makes electron-builder install-app-deps fail loudly
        # rather than fall back to prebuilt-only via our postinstall
        # `|| echo` guard. We want a clean ABI match on release builds.
        env:
          CI: true
        run: npm ci

      - name: Build service runtime (resources/runtime)
        # Standalone Node + ABI-matched node-pty for THIS os/arch, shipped via
        # electron-builder extraResources → <resources>/runtime. Without it the
        # per-user OS-service host can't activate (Genie falls back to the
        # detached host). Must run BEFORE nextron build so packaging includes it.
        # The script self-verifies node-pty loads under the standalone Node.
        run: npm run build:runtime

      # The build steps below conditionally export signing env vars only
      # when the corresponding secrets are present. Setting CSC_LINK="" (the
      # default when a secret isn't configured) makes electron-builder treat
      # the empty string as a cert path and bail with "<project-dir> not a
      # file". Explicit absence vs. "yes I want unsigned" is set via
      # CSC_IDENTITY_AUTO_DISCOVERY=false instead.

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$WINDOWS_CSC_LINK" ]; then
            export CSC_LINK="$WINDOWS_CSC_LINK"
            export CSC_KEY_PASSWORD="$WINDOWS_CSC_KEY_PASSWORD"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx nextron build --win

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            export CSC_LINK="$MAC_CSC_LINK"
            export CSC_KEY_PASSWORD="$MAC_CSC_KEY_PASSWORD"
            export APPLE_ID="$APPLE_ID_SECRET"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx nextron build --mac

      - name: Build (Linux)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx nextron build --linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-installer
          path: |
            dist/${{ matrix.artifact }}
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14

  # Publish the release: flip draft → prerelease ONLY after every platform leg
  # (needs: release) has attached its artifacts — including the Windows
  # latest.yml that electron-updater fetches (it uploads last). Drafts are
  # invisible to the updater, so this makes the release appear atomically and
  # complete, closing the race where a client saw the tag before latest.yml
  # existed and 404'd on "Check for updates".
  finalize-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release (un-draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --prerelease=true
