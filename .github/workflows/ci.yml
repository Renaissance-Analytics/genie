name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck (main)
        run: npx tsc --noEmit -p main/tsconfig.json
      - name: Typecheck (renderer)
        run: npx tsc --noEmit -p renderer/tsconfig.json
      - name: Vitest
        run: npm test
      - name: Build renderer (static export)
        run: npx next build renderer
