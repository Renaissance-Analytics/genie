name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions):
# this workflow only reads the repo — checkout, install, typecheck, test, build.
# No PR writes, releases, or SARIF uploads, so read-only contents is sufficient.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck (main)
        run: npx tsc --noEmit -p main/tsconfig.json
      - name: Typecheck (renderer)
        run: npx tsc --noEmit -p renderer/tsconfig.json
      - name: Vitest
        run: npm test
      - name: Build renderer (static export)
        run: npx next build renderer
